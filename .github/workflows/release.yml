name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Backend for All Platforms
        working-directory: backend
        run: |
          mkdir -p bin
          # macOS Intel
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/server-darwin-amd64 ./cmd/server
          # macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/server-darwin-arm64 ./cmd/server
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/server-linux-amd64 ./cmd/server
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bin/server-windows-amd64.exe ./cmd/server

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: backend/bin/*

  build-electron:
    name: Build Electron App
    needs: build-backend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-binaries
          path: backend/bin

      - name: Make Backend Executable (Unix)
        if: matrix.platform != 'win'
        run: chmod +x backend/bin/*

      - name: Install Dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build Electron App (macOS)
        if: matrix.platform == 'mac'
        working-directory: electron-app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Windows)
        if: matrix.platform == 'win'
        working-directory: electron-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Linux)
        if: matrix.platform == 'linux'
        working-directory: electron-app
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            electron-app/release/*.dmg
            electron-app/release/*.zip
          if-no-files-found: warn

      - name: Upload Artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            electron-app/release/*.exe
            electron-app/release/*.zip
          if-no-files-found: warn

      - name: Upload Artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            electron-app/release/*.AppImage
            electron-app/release/*.deb
            electron-app/release/*.rpm
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-backend, build-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: find artifacts -type f

      - name: Get Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Agent Orchestrator ${{ steps.get_version.outputs.VERSION }}

            ### Downloads
            - **macOS**: Download the `.dmg` file for your architecture (Intel or Apple Silicon)
            - **Windows**: Download the `.exe` installer
            - **Linux**: Download the `.AppImage`, `.deb`, or `.rpm` file

            ### What's New
            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Installation
            - **macOS**: Download .dmg, open, drag to Applications
            - **Windows**: Download .exe installer, run
            - **Linux**: Download .AppImage, chmod +x, run

            ### System Requirements
            - **macOS**: macOS 10.15 (Catalina) or later
            - **Windows**: Windows 10 or later
            - **Linux**: Any modern distribution with glibc 2.28+
          files: |
            artifacts/electron-mac/*.dmg
            artifacts/electron-mac/*.zip
            artifacts/electron-win/*.exe
            artifacts/electron-win/*.zip
            artifacts/electron-linux/*.AppImage
            artifacts/electron-linux/*.deb
            artifacts/electron-linux/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
